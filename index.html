<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音情绪驱动虚拟头部</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; }

        #app {
            display: grid;
            grid-template-columns: 1fr 320px;
            height: 100vh;
            min-height: 0;
        }

        #scene-container {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        #ui-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            overflow-y: auto;
            min-height: 0;
        }

        /* 控制按钮 */
        .controls { display: flex; gap: 8px; flex-shrink: 0; }
        .controls button {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        #start-btn { background: #1e3a5f; color: #4cdf6e; border: 2px solid #4cdf6e; }
        #start-btn:hover:not(:disabled) { background: #4cdf6e; color: #000; }
        #stop-btn { background: #1e3a5f; color: #e94560; border: 2px solid #e94560; }
        #stop-btn:hover:not(:disabled) { background: #e94560; color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 电平条 */
        #level-container { flex-shrink: 0; }
        #level-container label { font-size: 11px; color: #888; }
        #level-bar-bg {
            width: 100%; height: 10px; background: #0a1628; border-radius: 5px;
            overflow: hidden; margin-top: 4px;
        }
        #level-bar {
            height: 100%; width: 0%; border-radius: 5px;
            background: linear-gradient(90deg, #4cdf6e 0%, #ffd700 60%, #e94560 100%);
            transition: width 50ms linear;
        }

        /* 情绪显示 */
        .card { background: #0f3460; border-radius: 10px; padding: 14px; flex-shrink: 0; }
        .card h3 { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        #emotion-label {
            font-size: 26px; font-weight: bold; text-align: center; padding: 6px 0;
            transition: color 0.4s;
        }
        #emotion-status { font-size: 11px; color: #888; text-align: center; margin-top: 4px; }

        /* 特征值 */
        .feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .feat-item { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a1a3e; }
        .feat-item span:last-child { color: #53a8b6; font-weight: bold; font-family: monospace; }

        /* 波形 */
        .canvas-wrap canvas { width: 100%; height: 70px; display: block; background: #0a1628; border-radius: 6px; margin-bottom: 8px; }

        /* 响应式：窄屏改为上下布局 */
        @media (max-width: 700px) {
            #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            #ui-panel { max-height: 40vh; border-left: none; border-top: 1px solid #0f3460; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="scene-container"></div>
    <div id="ui-panel">
        <div class="controls">
            <button id="start-btn">开始录音</button>
            <button id="stop-btn" disabled>停止录音</button>
        </div>
        <div id="level-container">
            <label>输入电平</label>
            <div id="level-bar-bg"><div id="level-bar"></div></div>
        </div>
        <div class="card">
            <h3>当前情绪</h3>
            <div id="emotion-label">--</div>
            <div id="emotion-status">等待启动</div>
        </div>
        <div class="card">
            <h3>音频特征</h3>
            <div class="feat-grid">
                <div class="feat-item"><span>能量</span><span id="f-energy">--</span></div>
                <div class="feat-item"><span>响度dB</span><span id="f-loudness">--</span></div>
                <div class="feat-item"><span>过零率</span><span id="f-zcr">--</span></div>
                <div class="feat-item"><span>质心Hz</span><span id="f-centroid">--</span></div>
                <div class="feat-item"><span>MFCC1</span><span id="f-mfcc1">--</span></div>
                <div class="feat-item"><span>MFCC2</span><span id="f-mfcc2">--</span></div>
                <div class="feat-item"><span>MFCC3</span><span id="f-mfcc3">--</span></div>
                <div class="feat-item"><span>音高Hz</span><span id="f-pitch">--</span></div>
            </div>
        </div>
        <div class="card canvas-wrap">
            <h3>波形</h3>
            <canvas id="waveform-canvas"></canvas>
            <h3>频谱</h3>
            <canvas id="spectrum-canvas"></canvas>
        </div>
    </div>
</div>
<script src="lib/three.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
